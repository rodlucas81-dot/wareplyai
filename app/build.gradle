apply plugin: 'com.android.application'

android {
    namespace 'com.whatsappreply'
    compileSdk 34

    defaultConfig {
        applicationId "com.whatsappreply"
        minSdk 26
        targetSdk 34
        buildToolsVersion "36.1.0"
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
}
