<style>
:root {
  --gold: #d4a843;
  --gold2: #f0c85a;
  --dark: #0b0f18;
  --dark2: #101520;
  --dark3: #181f2e;
  --dark4: #1f2738;
  --cream: #e8edf8;
  --muted: #7a8bae;
  --border: rgba(255,255,255,0.08);
  --green: #4ade80;
  --red: #ff6b6b;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--dark);
  color: var(--cream);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

h1, h2, h3 { font-family: 'Lora', Georgia, serif; font-weight: 700; line-height: 1.2; }

a { color: var(--gold2); text-decoration: none; }
a:hover { color: var(--gold); }

/* TOP BAR */
.topbar {
  background: var(--dark2);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  position: sticky; top: 0; z-index: 100;
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; background: var(--dark3); }
.brand-text { display: flex; flex-direction: column; line-height: 1.1; }
.brand-text strong { color: var(--cream); font-size: 13px; font-weight: 700; }
.brand-text span { color: var(--muted); font-size: 11px; }
.lang-btn {
  background: transparent; color: var(--cream); border: 1px solid var(--border);

  cursor: pointer; font-family: inherit;
}
.lang-btn:hover { border-color: var(--gold); color: var(--gold2); }

/* CONTAINER */
.wrap { max-width: 640px; margin: 0 auto; padding: 32px 20px 80px; }

/* HERO */
.badge {
  display: inline-block; background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: var(--dark); font-weight: 800; font-size: 11px; letter-spacing: 0.08em;
  padding: 6px 12px; border-radius: 999px; margin-bottom: 18px;
}
.hero h1 {
  font-size: clamp(28px, 6vw, 40px);
  color: var(--cream); margin-bottom: 14px;
}
.hero h1 .gold { color: var(--gold2); }
.hero p.sub { color: var(--muted); font-size: 16px; margin-bottom: 24px; }

.trust-row {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 28px;
}
.trust-pill {
  background: var(--dark2); border: 1px solid var(--border); border-radius: 14px;
  padding: 12px 10px; text-align: center;
}
.trust-pill .dot { color: var(--gold); font-size: 18px; line-height: 1; }
.trust-pill strong { display: block; color: var(--cream); font-size: 13px; font-weight: 700; margin-top: 6px; }
.trust-pill span { display: block; color: var(--muted); font-size: 11px; margin-top: 2px; }

.btn-primary {
  display: block; width: 100%; background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: var(--dark); font-weight: 800; font-size: 16px;
  padding: 16px 20px; border: 0; border-radius: 14px; cursor: pointer;
  font-family: inherit; transition: transform .15s ease, box-shadow .15s ease;
  box-shadow: 0 6px 20px rgba(212,168,67,0.25);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(212,168,67,0.35); }

.btn-secondary {
  background: transparent; color: var(--cream); border: 1px solid var(--border);
  padding: 12px 18px; border-radius: 12px; font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}
.btn-secondary:hover { border-color: var(--gold); color: var(--gold2); }

/* FORM CARD */
.card {
  background: var(--dark2); border: 1px solid var(--border); border-radius: 18px;
  padding: 24px 22px; margin-top: 8px;
}
.progress {

}
.progress-fill {

}
.step-meta { color: var(--muted); font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
.q-title { font-size: 22px; color: var(--cream); margin-bottom: 6px; }
.q-help { color: var(--muted); font-size: 14px; margin-bottom: 20px; }

.choice-grid { display: grid; gap: 10px; }
.choice {
  display: block; width: 100%; text-align: left;
  background: var(--dark3); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px; color: var(--cream); font-size: 15px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: all .15s ease;
}
.choice:hover { border-color: var(--gold); background: var(--dark4); }
.choice.selected { border-color: var(--gold); background: rgba(212,168,67,0.10); color: var(--gold2); }

.field { margin-bottom: 14px; }
.field label { display: block; color: var(--muted); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.field input, .field select {
  width: 100%; background: var(--dark3); border: 1px solid var(--border);
  border-radius: 12px; padding: 13px 14px; color: var(--cream); font-size: 15px;

}
.field input:focus, .field select:focus { border-color: var(--gold); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.error { color: var(--red); font-size: 13px; margin-top: 6px; min-height: 16px; }

.consent {
  display: flex; gap: 10px; align-items: flex-start; margin: 16px 0;

}

.nav-row {

}

/* SUCCESS */
.success-icon {
  width: 64px; height: 64px; border-radius: 50%;

}
.success-title { text-align: center; font-size: 26px; color: var(--cream); margin-bottom: 10px; }

.calendar-wrap {
  background: var(--dark3); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden; margin-top: 14px;
}
.calendar-wrap iframe { display: block; width: 100%; height: 700px; border: 0; background: #fff; }
.calendar-fallback { text-align: center; padding: 12px; color: var(--muted); font-size: 13px; }
.calendar-fallback a { font-weight: 700; }

.success-actions { display: flex; justify-content: center; gap: 12px; margin-top: 22px; flex-wrap: wrap; }

/* Credit homework block */
.homework {
  margin-top: 28px; padding: 22px 20px;
  background: var(--dark3); border: 1px solid var(--border); border-radius: 14px;
}
.homework h3 { font-size: 18px; color: var(--cream); margin-bottom: 8px; }
.homework .intro { color: var(--muted); font-size: 13px; margin-bottom: 18px; line-height: 1.5; }
.homework .step { padding: 14px 0; border-top: 1px solid var(--border); }
.homework .step:first-of-type { border-top: 0; padding-top: 4px; }
.homework .step h4 {
  font-family: 'Montserrat', sans-serif;
  font-size: 13px; color: var(--gold); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;
}
.homework .step p { color: var(--cream); font-size: 13px; line-height: 1.55; margin-bottom: 10px; }
.homework .step ul { list-style: none; padding: 0; margin: 8px 0; }
.homework .step ul li {
  padding: 8px 0 8px 18px; color: var(--cream); font-size: 13px;
  position: relative; line-height: 1.45;
}
.homework .step ul li::before {
  content: "●"; color: var(--gold); position: absolute; left: 0; top: 8px; font-size: 10px;
}
.homework .step a {
  display: inline-block; background: rgba(212,168,67,0.15); color: var(--gold2);
  padding: 8px 14px; border-radius: 10px; font-weight: 700; font-size: 13px;
  margin-top: 6px; border: 1px solid rgba(212,168,67,0.3);
}
.homework .step a:hover { background: rgba(212,168,67,0.25); }
.homework .fico-note {
  background: var(--dark4); padding: 12px 14px; border-radius: 10px;
  font-size: 12px; color: var(--muted); line-height: 1.55; margin-top: 8px;
}

.legal-notice {
  margin-top: 16px; padding: 12px 14px;
  background: var(--dark3); border-left: 3px solid var(--gold);
  border-radius: 8px; font-size: 11px; color: var(--muted); line-height: 1.55;
}
.legal-notice + .legal-notice { margin-top: 8px; }

/* Enrichment widget */
.enrich {
  margin-top: 22px; padding: 22px 20px;
  background: var(--dark2); border: 1px solid var(--border); border-radius: 14px;
}
.enrich h3 { font-size: 17px; color: var(--cream); margin-bottom: 6px; }
.enrich .intro { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
.enrich .group { margin-bottom: 16px; }
.enrich .group .label {
  display: block; color: var(--cream); font-size: 13px; font-weight: 700;
  margin-bottom: 8px;
}
.enrich .pills { display: flex; flex-wrap: wrap; gap: 8px; }
.enrich .pill {
  background: var(--dark3); border: 1px solid var(--border); border-radius: 999px;
  padding: 8px 14px; color: var(--cream); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}
.enrich .pill:hover { border-color: var(--gold); }
.enrich .pill.selected { border-color: var(--gold); background: rgba(212,168,67,0.15); color: var(--gold2); }
.enrich input[type="number"] {
  width: 100%; background: var(--dark3); border: 1px solid var(--border);
  border-radius: 10px; padding: 11px 14px; color: var(--cream); font-size: 15px;
  font-family: inherit; outline: none;
}
.enrich input[type="number"]:focus { border-color: var(--gold); }
.enrich .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
.enrich .done {
  text-align: center; padding: 18px; color: var(--gold2);
  font-weight: 600; font-size: 14px;
}

/* FOOTER — compliance block */
footer {
  margin-top: 40px; padding: 28px 20px 40px;

}
.foot-wrap { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 18px; }
.foot-identity { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.foot-block { background: var(--dark3); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
.foot-block .label { font-size: 10px; font-weight: 700; color: var(--gold); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
.foot-block .name { color: var(--cream); font-weight: 700; font-size: 13px; margin-bottom: 2px; }
.foot-block .meta { font-size: 11px; color: var(--muted); }

.foot-licenses { background: var(--dark3); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
.foot-licenses .row { display: flex; flex-wrap: wrap; gap: 6px 14px; align-items: center; font-size: 11px; }
.foot-licenses .row strong { color: var(--cream); }
.foot-eho { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--dark3); border: 1px solid var(--border); border-radius: 12px; }
.foot-eho .eho-logo { width: 36px; height: 36px; flex: 0 0 36px; }
.foot-eho strong { color: var(--cream); font-size: 12px; }
.foot-legal { font-size: 11px; line-height: 1.65; color: var(--muted); padding: 0 4px; }
.foot-canspam { font-size: 11px; color: var(--muted); padding: 12px 14px; background: var(--dark3); border: 1px solid var(--border); border-radius: 12px; }
.foot-links { display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px; padding: 0 4px; }
.foot-links a { color: var(--gold2); font-weight: 600; }
.foot-copyright { font-size: 11px; color: var(--muted); text-align: center; padding-top: 8px; border-top: 1px solid var(--border); }
@media (max-width: 540px) {
  .foot-identity { grid-template-columns: 1fr; }
}

.disclosure-pill {
  display: block; background: var(--dark3); border: 1px solid var(--border);

/* RESPONSIVE */

<main class="wrap" id="app"></main>

<footer id="site-footer"></footer>

<script>
// ============================================================================
// STATE
// ============================================================================
const state = {
  lang: (navigator.language || "en").toLowerCase().startsWith("pt") ? "pt" : "en",
  view: "hero",            // hero | form | success
  step: 0,
  answers: {
    state: null,
    residency: null,
    employment: null,
    situation: null,       // rent+intent OR own+intent (refi/HELOC/buy-another/sell) OR exploring
    timeline: null,        // now / 1to3 / 3to6 / 6to12 / 12plus
    scoreRange: null,      // excellent / good / fair / below620 / unknown / noFile
    reportItems: [],       // multi-select: collections / late / medical / bk / fc / au / maxed / none / notSure
    firstName: "",
    lastName: "",
    email: "",
    phone: "",
    bestTime: "any",
    consent: false,
  },
  outcome: null,           // goodFit | outOfState | challenge | lowInfo
  submitting: false,
  submitError: "",
};

const TOTAL_STEPS = 8;
const MULTI_STEP_INDEX = 6;  // Q7 (zero-indexed = 6) is multi-select — requires Next button

function t(key, ...args) {
  let s = i18n[state.lang][key] || i18n.en[key] || key;
  args.forEach((a, i) => { s = s.replace("{" + i + "}", a); });
  return s;
}

// ============================================================================
// RENDERING
// ============================================================================
function render() {
  document.documentElement.lang = state.lang;
  document.getElementById("brand-img").src = CONFIG.loHeadshot;
  document.getElementById("brand-name").textContent = CONFIG.loName;
  document.getElementById("brand-title").textContent = CONFIG.loTitle + " · " + CONFIG.nmls;
  document.getElementById("lang-btn").textContent = t("langSwitch");
  document.getElementById("site-footer").innerHTML = renderFooter();

  const app = document.getElementById("app");
  if (state.view === "hero") app.innerHTML = renderHero();
  else if (state.view === "form") app.innerHTML = renderForm();
  else if (state.view === "success") app.innerHTML = renderSuccess();

  wireHandlers();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function renderHero() {
  return `
    <section class="hero">
      <span class="badge">${t("badge")}</span>
      <h1>${t("heroTitle")}</h1>
      <p class="sub">${t("heroSub")}</p>
      <div class="disclosure-pill">${t("notAppNote")}</div>
      <div class="trust-row">
        <div class="trust-pill"><span class="dot">●</span><strong>${t("trustFree")}</strong><span>${t("trustFreeSub")}</span></div>
        <div class="trust-pill"><span class="dot">●</span><strong>${t("trustNoPull")}</strong><span>${t("trustNoPullSub")}</span></div>
        <div class="trust-pill"><span class="dot">●</span><strong>${t("trustTime")}</strong><span>${t("trustTimeSub")}</span></div>

      <p style="margin-top:14px;font-size:11px;color:var(--muted);line-height:1.5;">${t("croaDisclaimer")}</p>
    </section>
  `;
}

function ehoLogoSvg() {
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" class="eho-svg" width="36" height="36" aria-label="Equal Housing Opportunity">
    <rect width="120" height="120" fill="#000"/>
    <polygon points="60,20 18,52 102,52 60,20" fill="#fff"/>
    <rect x="22" y="52" width="76" height="44" fill="#fff"/>
    <rect x="42" y="64" width="36" height="6" fill="#000"/>
    <rect x="42" y="78" width="36" height="6" fill="#000"/>
    <rect x="0" y="96" width="120" height="24" fill="#000"/>
    <text x="60" y="106" font-family="Arial, sans-serif" font-size="8" font-weight="800" fill="#fff" text-anchor="middle">EQUAL HOUSING</text>
    <text x="60" y="116" font-family="Arial, sans-serif" font-size="8" font-weight="800" fill="#fff" text-anchor="middle">OPPORTUNITY</text>
  </svg>`;
}

function renderFooter() {
  return `
    <div class="foot-wrap">
      <div class="foot-identity">
        <div class="foot-block">
          <div class="label">${t("footerOfficer")}</div>

function renderForm() {
  const stepHtml = [

  const isLast = state.step === TOTAL_STEPS - 1;
  // Steps that require an explicit Next button (multi-select + contact form):
  const needsNextButton = state.step === MULTI_STEP_INDEX || isLast;
  return `

// ============================================================================
// HANDLERS
// ============================================================================
function wireHandlers() {
  document.getElementById("lang-btn").onclick = () => {
    state.lang = state.lang === "en" ? "pt" : "en";
    render();
  };

  if (state.view === "hero") {
    const b = document.getElementById("start-btn");
    if (b) b.onclick = () => { state.view = "form"; state.step = 0; render(); };
    return;
  }

  if (state.view === "form") {
    // Single-select choices (Q1-Q6): auto-advance on click
    document.querySelectorAll(".choice[data-field]").forEach(btn => {
      btn.onclick = () => {
        const f = btn.dataset.field;
        state.answers[f] = btn.dataset.value;
        state.submitError = "";
        if (state.step < TOTAL_STEPS - 1) state.step++;
        render();
      };
    });

    // Multi-select items (Q7): toggle, require Next
    document.querySelectorAll("[data-multi-item]").forEach(btn => {
      btn.onclick = () => {
        const v = btn.dataset.multiItem;
        const items = state.answers.reportItems;
        // "none" and "notSure" are mutually exclusive with everything else
        if (v === "none" || v === "notSure") {
          state.answers.reportItems = items.includes(v) ? [] : [v];
        } else {
          const filtered = items.filter(x => x !== "none" && x !== "notSure");
          state.answers.reportItems = filtered.includes(v)
            ? filtered.filter(x => x !== v)
            : [...filtered, v];
        }
        state.submitError = "";
        render();
      };
    });

    const back = document.getElementById("back-btn");
    if (back) back.onclick = () => { state.step = Math.max(0, state.step - 1); state.submitError = ""; render(); };

    const next = document.getElementById("next-btn");
    if (next) next.onclick = () => {
      if (!validateStep()) { render(); return; }
      state.step++;
      state.submitError = "";
      render();
    };

    const submit = document.getElementById("submit-btn");
    if (submit) submit.onclick = handleSubmit;

    // Contact step (Q8, zero-indexed = 7)
    if (state.step === 7) {
      ["firstName","lastName","email","phone","bestTime"].forEach(k => {
        const el = document.getElementById("f-" + k);
        if (el) el.oninput = el.onchange = (e) => { state.answers[k] = e.target.value; };
      });
      const c = document.getElementById("f-consent");
      if (c) c.onchange = (e) => { state.answers.consent = e.target.checked; };
    }
    return;
  }

  if (state.view === "success") {
    const r = document.getElementById("restart-btn");
    if (r) r.onclick = () => {
      Object.assign(state.answers, {
        state:null, residency:null, employment:null, situation:null,
        timeline:null, scoreRange:null, reportItems:[],
        firstName:"", lastName:"", email:"", phone:"", bestTime:"any", consent:false,
      });
      state.view = "hero"; state.step = 0; state.outcome = null; state.submitError = "";
      render();
    };
  }
}

function validateStep() {
  const a = state.answers;
  // Steps 0..5 are single-select; step 6 is multi-select; step 7 is contact.
  const singleFields = ["state","residency","employment","situation","timeline","scoreRange"];
  if (state.step <= 5) {
    if (!a[singleFields[state.step]]) { state.submitError = t("fieldErr"); return false; }
    return true;
  }
  if (state.step === 6) {
    if (!a.reportItems || a.reportItems.length === 0) {
      state.submitError = t("multiSelectErr");
      return false;
    }
    return true;
  }
  // Step 7 — contact
  if (!a.firstName || !a.lastName) { state.submitError = t("fieldErr"); return false; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(a.email)) { state.submitError = t("emailErr"); return false; }
  if (a.phone.replace(/\D/g, "").length < 10) { state.submitError = t("phoneErr"); return false; }
  if (!a.consent) { state.submitError = t("consentErr"); return false; }
  return true;
}

// ============================================================================
// FIT LOGIC — decides which success message + whether to show calendar
// ============================================================================
// Items severe enough to require a personal conversation (no self-serve booking).
const SEVERE_ITEMS = new Set(["bk", "fc", "medical"]);

// Lender overlays per Rod's shop:
//   FHA 580 (first-time, owner-occupied purchase only)
//   Refinance / HELOC: 640 minimum
//   Everything else: 620 minimum
function programMinimum(situation) {
  if (situation === "sit_own_refi" || situation === "sit_own_heloc") return 640;
  if (situation === "sit_rent_buy" || situation === "sit_explore")   return 580;
  return 620;
}

// Numerical bounds for each reported score bucket.
function scoreRangeBounds(scoreRange) {
  switch (scoreRange) {
    case "excellent": return [740, 850];
    case "good":      return [680, 739];
    case "fair":      return [620, 679];
    case "below620":  return [300, 619];
    default:          return null; // unknown / noFile
  }
}

function computeOutcome(a) {
  if (a.state === "OTHER") return "outOfState";

  // Severe report items always require a personal conversation.
  const hasSevereItem = (a.reportItems || []).some(x => SEVERE_ITEMS.has(x));
  if (hasSevereItem) return "challenge";

  // No score info — Rod needs to walk through it personally.
  if (a.scoreRange === "unknown" || a.scoreRange === "noFile") return "lowInfo";
  if ((a.reportItems || []).includes("notSure")) return "lowInfo";

  const min = programMinimum(a.situation);
  const bounds = scoreRangeBounds(a.scoreRange);
  if (!bounds) return "lowInfo";

  // Entire range below the situation's minimum -> not eligible without rebuild.
  if (bounds[1] < min) return "challenge";
  // Entire range at or above minimum -> eligible, self-serve booking OK.
  if (bounds[0] >= min) return "goodFit";
  // Range straddles minimum -> need exact number to confirm.
  return "borderline";
}

// Show calendar only for outcomes where self-serve booking is appropriate.
function showCalendarFor(outcome) {
  return outcome === "goodFit";
}

function buildLeadSummary(a, outcome) {
  const min = programMinimum(a.situation);
  const bounds = scoreRangeBounds(a.scoreRange);
  const rangeStr = bounds ? (bounds[0] + "–" + bounds[1]) : (a.scoreRange || "n/a");
  return [
    "=== LEAD: Free Credit Analysis + Game Plan ===",
    "Outcome: " + outcome,
    "State: " + a.state,
    "Residency: " + a.residency,
    "Employment: " + a.employment,
    "Situation/Intent: " + a.situation,
    "Program minimum FICO (this path): " + min,
    "Timeline: " + a.timeline,
    "Score bucket: " + a.scoreRange + " (" + rangeStr + ")",
    "Report items: " + (a.reportItems || []).join(", "),
    "Best time: " + a.bestTime,
    "Language: " + state.lang,
    "Submitted: " + new Date().toISOString(),
  ].join("\n");
}

// ============================================================================
// SUBMIT — Formspree
// ============================================================================
async function handleSubmit() {
  if (!validateStep()) { render(); return; }
  state.submitting = true;
  state.submitError = "";
  render();

  const a = state.answers;
  const outcome = computeOutcome(a);
  const payload = {
    _subject: `Credit Analysis Lead — ${a.firstName} ${a.lastName} (${a.state}, ${outcome}, ${a.situation || "?"})`,
    name: `${a.firstName} ${a.lastName}`,
    firstName: a.firstName,
    lastName: a.lastName,
    email: a.email,
    phone: a.phone,
    bestTime: a.bestTime,
    state: a.state,
    residency: a.residency,
    employment: a.employment,
    situation: a.situation,
    timeline: a.timeline,
    scoreRange: a.scoreRange,
    reportItems: (a.reportItems || []).join(", "),
    outcome: outcome,
    language: state.lang,
    consentGiven: a.consent ? "yes" : "no",
    leadSummary: buildLeadSummary(a, outcome),
    source: "rodmortgage.netlify.app/credit",
  };

  try {
    const res = await fetch(CONFIG.formspreeEndpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "application/json" },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error("Formspree " + res.status);
    state.outcome = outcome;
    state.view = "success";
    state.submitting = false;
    render();
  } catch (err) {
    console.error(err);
    state.submitting = false;
    state.submitError = t("submitErr");
    render();
  }
}

// ============================================================================
// HELPERS
// ============================================================================
function escapeHtml(s) {
  return String(s || "").replace(/[&<>"']/g, ch => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[ch]));
}

// boot
render();
